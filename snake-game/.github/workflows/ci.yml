name: Continuous Integration (CI)

# 1. ĐIỀU KIỆN KÍCH HOẠT: Máy ảo sẽ tự chạy khi có push hoặc tạo Pull Request vào 2 nhánh này
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    # Sử dụng hệ điều hành Ubuntu mới nhất cho máy ảo
    runs-on: ubuntu-latest

    steps:
    # Bước 2.1: Tải toàn bộ source code từ Repo GitHub của bạn xuống máy ảo
    - name: Checkout code
      uses: actions/checkout@v4

    # Bước 2.2: Khởi tạo môi trường Node.js (Phiên bản 18 tương thích tốt với Next.js)
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18
        cache: 'npm' # Bật cache giúp các lần chạy sau cài thư viện siêu nhanh

    # Bước 2.3: Cài đặt các thư viện (dependencies) từ file package.json
    - name: Install dependencies
      run: npm install

    # Bước 2.4: Chạy lệnh build thử nghiệm của Next.js để rà soát lỗi compile/TypeScript
    - name: Next.js Build Test
      run: npm run build
      # Nạp các biến môi trường bí mật từ GitHub Secrets vào quá trình build
      env:
        NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}